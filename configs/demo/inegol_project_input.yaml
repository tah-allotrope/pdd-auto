    "AC1. Applicability conditions and methodology version are specified (Section 1 of the methodology)": true
    "AC2. Geographic conditions are unrestricted (Section 2 of the methodology)": true
    "AC3. Project is located in İnegöl District, Bursa Province, Türkiye, which is within the scope of ACM0022": true
