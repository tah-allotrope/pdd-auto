monitoring:
  parameters_monitored:
    - name: "W_MSW,y"
      unit: "tonnes"
      description: "Municipal solid waste received/treated by the project"
      frequency: "Continuous/weighbridge or operational records; aggregated monthly and annually"
      method: "Weighbridge/waste acceptance system"
      data_source: "Calibration and reconciliation with municipal records"
    - name: "Waste fractions"
      unit: "fraction or %"
      description: "Composition of waste by relevant ACM0022 categories"
      frequency: "Sampling/characterization according to approved procedure"
      method: "Waste characterization records/lab analysis"
      data_source: "Sampling plan and QA/QC required"
    - name: "EG_export,y"
      unit: "MWh"
      description: "Electricity supplied to the grid"
      frequency: "Continuous meter reading; monthly and annual aggregation"
      method: "Revenue/export meter"
      data_source: "Meter calibration, cross-check with grid invoices"
    - name: "EG_import,y"
      unit: "MWh"
      description: "Electricity consumed from the grid"
      frequency: "Continuous meter reading; monthly and annual aggregation"
      method: "Import meter/invoices"
      data_source: "Used for project emissions from electricity consumption"
    - name: "Q_biogas,y"
      unit: "Nm3 or m3"
      description: "Biogas flow to engines/flare"
      frequency: "Continuous flow measurement; aggregated monthly and annually"
      method: "Biogas flow meters/SCADA"
      data_source: "Meter calibration and data completeness checks"
    - name: "CH4_biogas,y"
      unit: "% v/v"
      description: "Methane content of biogas"
      frequency: "Continuous analyzer or periodic measurement per monitoring plan"
      method: "Gas analyzer/lab records"
      data_source: "QA/QC and calibration required"
    - name: "Flare operation"
      unit: "hours/flow/temperature"
      description: "Emergency flare operation and destruction conditions"
      frequency: "Event-based and continuous where applicable"
      method: "Flare logs/SCADA"
      data_source: "Demonstrate combustion and destruction efficiency"
    - name: "Fossil fuel use"
      unit: "litres, kg, or GJ"
      description: "Fossil fuels consumed by project equipment"
      frequency: "As consumed; monthly/annual aggregation"
      method: "Fuel purchase/use records"
      data_source: "Apply TOOL03 where applicable"
    - name: "RDF production/end use"
      unit: "tonnes"
      description: "RDF produced and sent to end users or otherwise managed"
      frequency: "Operational records; monthly/annual aggregation"
      method: "RDF production/offtake records"
      data_source: "Needed for RDF/SB leakage/end-use assessment"
    - name: "Residual waste/by-products"
      unit: "tonnes"
      description: "Residuals, digestate, leachate or by-products sent to disposal/treatment/use"
      frequency: "Operational records; monthly/annual aggregation"
      method: "Facility logs/manifests"
      data_source: "Needed for leakage and project emissions"
  monitoring_equipment:
    - "Weighbridge"
    - "Revenue/export meter"
    - "Import meter"
    - "Biogas flow meters"
    - "Gas analyzer"
    - "SCADA"
    - "Flare logs"
  data_management: >
    Monitoring data is recorded electronically and physically archived per VCS
    requirements. Monthly and annual aggregation reports are produced and
    reconciled with invoices and operational logs.

