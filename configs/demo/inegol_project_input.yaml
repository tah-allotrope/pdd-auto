    "Applicability Conditions 8 - Monitoring includes: W_MSW, waste fractions, EG_export, EG_import, Q_biogas, CH4_biogas, flare operation, fossil fuel use, RDF/end use, residual waste/by-products": true
    "Applicability Conditions 9 - Monitoring plan is aligned with ACM0022 requirements (Section 2 of the methodology)": true
